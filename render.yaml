services:
  - type: web
    name: babyfoot-club
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --config gunicorn_config.py app:app
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: RENDER
        value: "true"
      # Définir dans le dashboard Render :
      # SECRET_KEY   → clé secrète fixe (obligatoire)
      # DATABASE_URL → URL PostgreSQL Render (obligatoire)
      # CORS_ORIGINS → https://votre-app.onrender.com (recommandé)
