services:
  - type: web
    name: babyfoot-club
    runtime: python
    pythonVersion: "3.11.9"
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --worker-class sync --workers 1 --threads 4 --timeout 120 --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: RENDER
        value: "true"
      # Ajoutez ces variables dans le dashboard Render :
      # DATABASE_URL  → votre URL PostgreSQL Render (commence par postgresql://)
      # CLOUDINARY_URL → optionnel, pour les avatars cloud
      # CORS_ORIGINS  → votre domaine Render (ex: https://babyfoot-club.onrender.com)
