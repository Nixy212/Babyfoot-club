<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Baby-Foot Club{% endblock %}</title>
  <link rel="manifest" href="/static/manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="BabyFoot">
  <link rel="apple-touch-icon" href="/static/images/logo.svg">
  <link rel="stylesheet" href="{{ url_for('static', filename='design-v3.css') }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous">
  {% block extra_head %}{% endblock %}
</head>
<body>

<nav class="nav nav-glass">
  <div class="nav-inner">
    <a href="/dashboard" class="nav-brand">
      <div class="logo-wrapper">
        <img src="{{ url_for('static', filename='images/logo.svg') }}" alt="">
        <div class="logo-pulse"></div>
      </div>
      <span class="brand-text">Baby-Foot Club</span>
    </a>
    <div class="nav-sep"></div>
    <div class="nav-links">
      <a href="/dashboard" class="nav-link {% if active_page == 'dashboard' %}active{% endif %}">
        <span class="nav-link-icon" data-bficon="home" data-size="18"></span><span>Dashboard</span>
      </a>
      <a href="/reservation" class="nav-link {% if active_page == 'reservation' %}active{% endif %}">
        <span class="nav-link-icon" data-bficon="calendar" data-size="18"></span><span>Réserver</span>
      </a>
      <a href="/lobby" class="nav-link {% if active_page == 'lobby' %}active{% endif %}">
        <span class="nav-link-icon" data-bficon="gamepad" data-size="18"></span><span>Lobby</span>
      </a>
      <a href="/stats" class="nav-link {% if active_page == 'stats' %}active{% endif %}">
        <span class="nav-link-icon" data-bficon="stats" data-size="18"></span><span>Stats</span>
      </a>
      <a href="/top" class="nav-link {% if active_page == 'top' %}active{% endif %}">
        <span class="nav-link-icon" data-bficon="trophy" data-size="18"></span><span>Classement</span>
      </a>
    </div>
    <div class="nav-right">
      <div class="user-profile-mini">
        <div class="nav-avatar" id="navAv">?</div>
        <span class="nav-username" id="navUsername"></span>
      </div>
      <button class="burger" id="burger" onclick="toggleMenu()" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>
</nav>

<div class="mobile-menu" id="mobileMenu">
  <button class="mobile-menu-close" onclick="toggleMenu()">✕</button>
  <a href="/dashboard" {% if active_page == 'dashboard' %}class="active"{% endif %}>🏠 Dashboard</a>
  <a href="/reservation" {% if active_page == 'reservation' %}class="active"{% endif %}>📅 Réserver</a>
  <a href="/live-score" {% if active_page == 'live' %}class="active"{% endif %}>🎮 Partie Live</a>
  <a href="/lobby" {% if active_page == 'lobby' %}class="active"{% endif %}>👥 Lobby</a>
  <a href="/stats" {% if active_page == 'stats' %}class="active"{% endif %}>📊 Stats</a>
  <a href="/top" {% if active_page == 'top' %}class="active"{% endif %}>🏆 Classement</a>
  <a href="/scores" {% if active_page == 'scores' %}class="active"{% endif %}>📋 Historique</a>
  <a href="/settings" {% if active_page == 'settings' %}class="active"{% endif %}>⚙️ Paramètres</a>
  <a href="/admin" id="adminBtnMobile" style="display:none">🔧 Admin</a>
  <div class="mobile-menu-sep"></div>
  <button class="mobile-menu-logout" onclick="logout()">🚪 Déconnexion</button>
  <button id="pwa-install-trigger" onclick="triggerPwaInstall()" style="display:none;width:100%;text-align:left;background:linear-gradient(135deg,rgba(205,127,50,0.15),rgba(205,127,50,0.05));border:1px solid rgba(205,127,50,0.4);color:var(--bronze);font-weight:700;font-size:1rem;padding:.9rem 1.25rem;border-radius:10px;cursor:pointer;margin-top:.5rem;font-family:inherit">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:6px"><rect x="5" y="2" width="14" height="20" rx="2"/><path d="M9 13h6M12 10v6"/></svg>Installer l'app
  </button>
</div>
<div class="menu-overlay" id="menuOverlay" onclick="toggleMenu()"></div>

{% block body %}{% endblock %}

<div class="toast-wrap" id="toast-global"></div>

<script src="{{ url_for('static', filename='profile-utils.js') }}"></script>
<script src="{{ url_for('static', filename='icons.js') }}"></script>
<script src="/static/pwa.js" defer></script>
<script>
function toggleMenu() {
  const menu = document.getElementById('mobileMenu');
  const isOpen = menu.classList.contains('open');
  document.getElementById('burger').classList.toggle('open');
  menu.classList.toggle('open');
  const overlay = document.getElementById('menuOverlay');
  if (overlay) overlay.classList.toggle('open');
  document.body.style.overflow = isOpen ? '' : 'hidden';
}

// logout est défini dans profile-utils.js mais on garde un fallback
if (typeof window.logout !== 'function') {
  window.logout = function() {
    fetch('/api/logout', {method:'POST'}).then(() => { location.href = '/'; });
  };
}

// Chargement utilisateur commun à toutes les pages
async function loadBaseUser() {
  // Guard : évite double-chargement si une page l'appelle déjà
  if (window._baseUserLoaded) return window._baseUserData || null;
  window._baseUserLoaded = true;
  try {
    const res = await fetch('/current_user');
    if (!res.ok) return null;
    const user = await res.json();
    if (!user) return null;
    window._currentUsername = user.username;
    window._isAdmin = user.is_admin;
    window._baseUserData = user;
    if (typeof ProfileUtils !== 'undefined') ProfileUtils.updateNav(user);
    if (user.is_admin) {
      const btn = document.getElementById('adminBtnMobile');
      if (btn) btn.style.display = 'flex';
    }
    return user;
  } catch(e) {
    console.warn('loadBaseUser failed:', e);
    return null;
  }
}

// Auto-appel sur toutes les pages (chaque page peut aussi l'appeler, le guard évite le doublon)
document.addEventListener('DOMContentLoaded', () => loadBaseUser());
</script>
{% block extra_scripts %}{% endblock %}
</body>
</html>
