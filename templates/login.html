<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0f111a">
  <link rel="manifest" href="{{ url_for('static', filename='manifest.json', v=asset_version) }}">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="BabyFoot">
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='images/logo.svg', v=asset_version) }}">
  <title>Connexion — Baby-Foot Club</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='design-v3.css', v=asset_version) }}">
  <style>
    html,body{height:100%;margin:0}
    body{
      display:flex;align-items:center;justify-content:center;
      min-height:100vh;padding:1.5rem;box-sizing:border-box;
      background:#0f111a;
    }

    /* Halo ambiant animé */
    .halo{position:fixed;pointer-events:none;z-index:0;border-radius:50%;filter:blur(80px);}
    .h1{width:55vw;height:55vw;max-width:320px;max-height:320px;
        background:radial-gradient(circle,rgba(212,136,78,.18),transparent 70%);
        top:-10vh;right:-10vw;animation:haloDrift1 14s ease-in-out infinite alternate;}
    .h2{width:45vw;height:45vw;max-width:260px;max-height:260px;
        background:radial-gradient(circle,rgba(232,184,74,.14),transparent 70%);
        bottom:-8vh;left:-8vw;animation:haloDrift2 18s ease-in-out infinite alternate;}
    .h3{width:35vw;height:35vw;max-width:200px;max-height:200px;
        background:radial-gradient(circle,rgba(212,136,78,.09),transparent 70%);
        top:50vh;left:30vw;animation:haloDrift1 22s ease-in-out infinite alternate-reverse;}
    @keyframes haloDrift1{0%{transform:translate(0,0) scale(1)}100%{transform:translate(15px,-20px) scale(1.08)}}
    @keyframes haloDrift2{0%{transform:translate(0,0) scale(1)}100%{transform:translate(-10px,18px) scale(1.05)}}

    /* Carte */
    .auth-card{
      position:relative;z-index:2;
      width:100%;max-width:390px;
      background:rgba(18,21,30,.92);
      backdrop-filter:blur(32px) saturate(140%);
      border:1px solid rgba(212,136,78,.2);
      border-radius:24px;
      padding:2.5rem 2rem 2rem;
      box-shadow:
        0 0 0 1px rgba(212,136,78,.06),
        0 8px 48px rgba(0,0,0,.6),
        0 0 80px rgba(212,136,78,.04);
    }

    /* Ligne décorative haut de carte */
    .auth-card::before{
      content:'';display:block;
      height:2px;width:60%;margin:0 auto 2rem;
      background:linear-gradient(90deg,transparent,rgba(212,136,78,.6),rgba(232,184,74,.6),transparent);
      border-radius:2px;
    }

    .auth-brand{
      display:flex;align-items:center;justify-content:center;
      gap:.6rem;margin-bottom:2rem;
    }
    .auth-brand img{
      width:36px;height:36px;
      filter:drop-shadow(0 0 10px rgba(212,136,78,.55));
    }
    .auth-brand span{
      font-family:var(--ff-head);font-size:.88rem;font-weight:400;
      letter-spacing:.1em;text-transform:uppercase;color:var(--c-t2);
    }

    .auth-title{
      font-family:var(--ff-head);font-size:1.9rem;font-weight:400;
      letter-spacing:.05em;text-transform:uppercase;
      color:var(--c-t1);margin:0 0 .35rem;text-align:center;
    }
    .auth-title em{
      font-style:normal;
      background:linear-gradient(135deg,var(--c-accent),var(--c-gold));
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    }
    .auth-sub{
      font-size:.875rem;color:var(--c-t3);
      margin:0 0 2rem;text-align:center;
    }

    .f{margin-bottom:1.1rem}
    .f label{
      display:block;font-family:var(--ff-sub);font-size:.72rem;font-weight:700;
      letter-spacing:.06em;text-transform:uppercase;color:var(--c-t2);margin-bottom:.45rem;
    }
    .f input{
      width:100%;padding:.85rem 1rem;
      background:rgba(10,12,18,.8);
      border:1px solid rgba(255,255,255,.08);
      border-radius:12px;color:var(--c-t1);font-size:.975rem;
      outline:none;transition:border-color .2s,box-shadow .2s;
      box-sizing:border-box;-webkit-appearance:none;
    }
    .f input:focus{
      border-color:rgba(212,136,78,.5);
      box-shadow:0 0 0 3px rgba(212,136,78,.1),0 0 20px rgba(212,136,78,.08);
    }
    .f input::placeholder{color:var(--c-t3)}

    .auth-btn{
      width:100%;padding:.95rem;margin-top:.5rem;
      background:linear-gradient(135deg,var(--c-accent) 0%,var(--c-gold) 100%);
      border:none;border-radius:12px;color:#fff;
      font-family:var(--ff-sub);font-size:.92rem;font-weight:700;
      letter-spacing:.05em;text-transform:uppercase;cursor:pointer;
      box-shadow:0 4px 24px rgba(212,136,78,.35);
      transition:box-shadow .2s,transform .15s;
    }
    .auth-btn:hover{box-shadow:0 6px 32px rgba(212,136,78,.5);transform:translateY(-1px)}
    .auth-btn:active{opacity:.88;transform:scale(.98)}
    .auth-btn:disabled{opacity:.45;cursor:not-allowed;transform:none;box-shadow:none}

    .auth-alert{
      display:none;padding:.7rem 1rem;border-radius:10px;
      font-size:.875rem;font-weight:600;margin-bottom:1.1rem;
      background:rgba(224,85,69,.1);color:var(--c-red);
      border:1px solid rgba(224,85,69,.22);
    }

    .auth-sep{
      display:flex;align-items:center;gap:.75rem;margin:1.4rem 0;
      font-size:.78rem;color:var(--c-t3);
    }
    .auth-sep::before,.auth-sep::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.06)}

    .auth-switch{text-align:center;font-size:.875rem;color:var(--c-t2)}
    .auth-switch a{color:var(--c-accent-h);font-weight:700;text-decoration:none}
    .auth-switch a:hover{text-decoration:underline}

    .spin{
      display:inline-block;width:16px;height:16px;
      border:2px solid rgba(255,255,255,.3);border-top-color:#fff;
      border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;
    }
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
<div class="halo h1"></div>
<div class="halo h2"></div>
<div class="halo h3"></div>

<div class="auth-card">
  <div class="auth-brand">
    <img src="{{ url_for('static', filename='images/logo.svg', v=asset_version) }}" alt="">
    <span>Baby-Foot Club</span>
  </div>
  <h1 class="auth-title">Connexion</h1>
  <p class="auth-sub">Entrez vos identifiants pour rejoindre le club</p>

  <div id="alert" class="auth-alert"></div>

  <div class="f">
    <label for="username">Nom d'utilisateur</label>
    <input type="text" id="username" placeholder="votre_pseudo"
      autocomplete="username" autocorrect="off" autocapitalize="none"
      spellcheck="false" inputmode="text" enterkeyhint="next">
  </div>
  <div class="f">
    <label for="password">Mot de passe</label>
    <input type="password" id="password" placeholder="••••••••"
      autocomplete="current-password" enterkeyhint="go">
  </div>

  <button class="auth-btn" id="loginBtn">Se connecter</button>

  <div class="auth-sep">ou</div>
  <div class="auth-switch">Pas encore de compte ? <a href="/register">S'inscrire</a></div>
</div>

<script>
  function showErr(msg){const e=document.getElementById('alert');e.textContent=msg;e.style.display='block';}
  async function login(){
    const u=document.getElementById('username').value.trim();
    const p=document.getElementById('password').value;
    const btn=document.getElementById('loginBtn');
    if(!u||!p){showErr('Veuillez remplir tous les champs');return;}
    btn.disabled=true;btn.innerHTML='<span class="spin"></span>';
    try{
      const d=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})}).then(r=>r.json());
      if(d.success){window.location.replace('/dashboard');}
      else{
        showErr(d.message||'Identifiants incorrects');
        btn.disabled=false;btn.textContent='Se connecter';
        document.getElementById('password').focus();document.getElementById('password').select();
      }
    }catch(e){showErr('Erreur réseau — réessayez');btn.disabled=false;btn.textContent='Se connecter';}
  }
  document.getElementById('loginBtn').addEventListener('click',login);
  document.getElementById('password').addEventListener('keydown',e=>{if(e.key==='Enter')login();});
  document.getElementById('username').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('password').focus();});
</script>
<script>window.__assetVersion = "{{ asset_version }}";</script>
<script>
(function () {
  const c = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
  const t = String((c && c.effectiveType) || '').toLowerCase();
  const slow = (c && c.saveData) || ['slow-2g', '2g', '3g'].includes(t);
  if (slow || (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches)) return;
  const s = document.createElement('script');
  s.src = "{{ url_for('static', filename='particles-bg.js', v=asset_version) }}";
  s.defer = true;
  document.body.appendChild(s);
})();
</script>
<script src="{{ url_for('static', filename='pwa.js', v=asset_version) }}" defer></script>
</body>
</html>
